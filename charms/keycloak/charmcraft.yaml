name: keycloak
type: charm
title: Keycloak
summary: Keycloak identity provider with FreeIPA LDAP federation.
description: |
  A Juju machine charm that deploys Keycloak via Docker and configures
  it with LDAP user federation against a FreeIPA server. Keycloak provides
  OpenID Connect (OIDC), OAuth 2.0, and SAML 2.0 identity brokering,
  backed by FreeIPA's LDAP directory for user storage.

base: ubuntu@24.04
build-base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-snaps:
      - astral-uv
  templates:
    plugin: dump
    source: templates
    organize:
      "*": templates/

config:
  options:
    admin-username:
      type: string
      default: "admin"
      description: |
        Keycloak bootstrap admin username.
    admin-password:
      type: secret
      description: |
        Juju secret containing the Keycloak admin password.
        Create: juju add-secret keycloak-admin password=<value>
        Grant:  juju grant-secret keycloak-admin keycloak
        Set:    juju config keycloak admin-password=secret:<id>
    realm-name:
      type: string
      default: "freeipa"
      description: |
        Name of the Keycloak realm to create.
    freeipa-server:
      type: string
      default: ""
      description: |
        FQDN or IP of the FreeIPA server for LDAP federation. Required.
    freeipa-domain:
      type: string
      default: ""
      description: |
        FreeIPA domain (e.g. freeipa.local). Used to construct LDAP base DN.
        Required.
    freeipa-admin-password:
      type: secret
      description: |
        Juju secret containing the FreeIPA admin password for LDAP bind.
        This can be the same secret used for freeipa-server admin-password.
        Create: juju add-secret freeipa-admin password=<value>
        Grant:  juju grant-secret freeipa-admin keycloak
        Set:    juju config keycloak freeipa-admin-password=secret:<id>
    image:
      type: string
      default: "quay.io/keycloak/keycloak:latest"
      description: |
        Keycloak OCI image to use.
    container-name:
      type: string
      default: "keycloak"
      description: |
        Name for the Docker container running Keycloak.
    https-port:
      type: int
      default: 8443
      description: |
        HTTPS port for Keycloak.
    http-port:
      type: int
      default: 8080
      description: |
        HTTP port for Keycloak.

actions:
  create-user:
    description: |
      Create a user in the Keycloak realm. Because the LDAP federation is
      configured with syncRegistrations or WRITABLE edit mode, the user
      will be written through to FreeIPA's LDAP directory and will be
      available on all enrolled client machines.
    params:
      username:
        type: string
        description: Username for the new user.
      first-name:
        type: string
        description: First name.
      last-name:
        type: string
        description: Last name.
      email:
        type: string
        description: Email address.
      password:
        type: string
        description: Initial password for the user.
    required:
      - username
      - first-name
      - last-name
      - password
  set-user-ssh-key:
    description: |
      Add an SSH public key to a FreeIPA user. The key is stored in
      FreeIPA's LDAP and automatically served to sshd on enrolled
      clients via SSSD (sss_ssh_authorizedkeys).
    params:
      username:
        type: string
        description: FreeIPA username to add the SSH key to.
      ssh-key:
        type: string
        description: SSH public key (e.g. "ssh-rsa AAAA... user@host").
    required:
      - username
      - ssh-key

provides:
  oidc:
    interface: oidc

requires:
  freeipa:
    interface: freeipa
